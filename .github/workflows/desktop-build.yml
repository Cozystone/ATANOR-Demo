name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOMAGE_RUST_TOOLCHAIN: "1.88.0"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.HOMAGE_RUST_TOOLCHAIN }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Python sidecar dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt pyinstaller

      - name: Build Python FastAPI sidecar
        run: python scripts/build_sidecar.py

      - name: Prepare Tauri updater mode
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: python scripts/prepare_tauri_ci.py

      - name: Build Tauri desktop bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "-"
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          npm run tauri -- build *>&1 | Tee-Object -FilePath tauri-build.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $tail = (Get-Content tauri-build.log -Tail 120) -join "`n"
            $escaped = $tail.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Host "::error title=Tauri build failed::$escaped"
            "### Tauri build failed" >> $env:GITHUB_STEP_SUMMARY
            '```text' >> $env:GITHUB_STEP_SUMMARY
            Get-Content tauri-build.log -Tail 120 >> $env:GITHUB_STEP_SUMMARY
            '```' >> $env:GITHUB_STEP_SUMMARY
            exit $exitCode
          }

      - name: Upload Tauri build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-${{ matrix.os }}
          path: tauri-build.log
          if-no-files-found: ignore

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: homage-desktop-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*
          if-no-files-found: error
