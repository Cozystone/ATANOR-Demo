[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "homage-trainer"
version = "0.1.0"
description = "Safe ATANOR-Core training dry-run scaffold."
requires-python = ">=3.11"
dependencies = ["homage-model==0.1.0"]

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.setuptools]
packages = ["trainer"]
