[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "datagate"
version = "0.1.0"
description = "Deterministic rule-based quality gate for ATANOR raw text documents."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
]

[tool.setuptools]
packages = ["datagate", "datagate.filters"]

[tool.pytest.ini_options]
testpaths = ["tests"]
