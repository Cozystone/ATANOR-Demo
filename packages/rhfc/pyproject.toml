[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "atanor-rhfc"
version = "0.1.0"
description = "Independent Resonant Holographic Field Computing Stage 1 package for ATANOR."
requires-python = ">=3.13"
dependencies = [
    "numpy>=1.26",
    "scipy>=1.11",
    "networkx>=3.2",
]

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.setuptools]
packages = ["rhfc"]

[tool.pytest.ini_options]
testpaths = ["tests"]
