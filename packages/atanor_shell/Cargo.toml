[package]
name = "atanor-shell"
version = "0.1.0"
edition = "2021"
description = "ATANOR's own compositor — the particle field is the desktop, drawn natively (stage 2b, M1: real wayland compositor, kiosk policy)"
license = "UNLICENSED"

[dependencies]
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dependencies.smithay]
version = "0.7"
default-features = false
features = [
    "backend_winit",
    "wayland_frontend",
    "desktop",
]

# M1b adds: backend_drm, backend_udev, backend_libinput, backend_session_libseat
# (TTY boot on ATANOR Linux). The state/handlers/input layers above are
# backend-agnostic and stay unchanged.
